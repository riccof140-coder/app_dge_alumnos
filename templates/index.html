<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Alumnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='tab.css') }}?v=12">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="card shadow-lg border-0" style="border-radius: 15px;">
            <div class="card-header bg-primary text-white p-4 d-flex justify-content-between align-items-center" style="border-radius: 15px 15px 0 0;">
                <h2 class="mb-0"><i class="bi bi-people-fill me-2"></i>Gestión de Alumnos</h2>
                <div>
                    <a href="/agregar" class="btn btn-light shadow-sm fw-bold text-primary">
                        <i class="bi bi-plus-circle-fill me-1"></i> Agregar Alumno
                    </a>
                </div>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-4">Alumno</th>
                                <th>Materia</th>
                                <th>Escuela</th>
                                <th class="text-center">Ficha</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for a in alumnos %}
                            <tr class="align-middle">
                                <td class="ps-4 fw-bold text-secondary">{{ a.nombre }}</td>
                                <td><span class="badge bg-info text-dark">{{ a.materia }}</span></td>
                                <td>{{ a.escuela }}</td>
                                <td class="text-center">
                                    <a class="btn btn-primary btn-sm rounded-pill px-3 shadow-sm" href="/alumno/{{ a.id }}">
                                        <i class="bi bi-eye-fill"></i> Abrir
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="card-footer bg-white text-end py-3" style="border-radius: 0 0 15px 15px;">
                <a href="/logout" class="btn btn-outline-danger btn-sm border-0">
                    <i class="bi bi-box-arrow-right"></i> Salir del Sistema
                </a>
            </div>
        </div>
    </div>

</body>
</html>
