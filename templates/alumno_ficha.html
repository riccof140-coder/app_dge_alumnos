<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha: {{ alumno.nombre }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='tab.css') }}?v=20">
</head>
<body>

<div class="container py-4">
    <a href="/inicio" class="btn btn-light mb-3 shadow-sm border-0 rounded-pill px-3">
        <i class="bi bi-arrow-left"></i> Volver al panel
    </a>

    <div class="card shadow-lg border-0 mb-4" style="border-radius: 20px; background: rgba(255,255,255,0.9);">
        <div class="card-body p-4 d-flex align-items-center">
            <div class="flex-shrink-0">
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center shadow" style="width: 80px; height: 80px; font-size: 2rem;">
                    {{ alumno.nombre[0] | upper }}
                </div>
            </div>
            <div class="flex-grow-1 ms-4">
                <h2 class="mb-1 fw-bold text-dark">{{ alumno.nombre }}</h2>
                <p class="text-muted mb-0">
                    <i class="bi bi-book me-1"></i> {{ alumno.materia }} | 
                    <i class="bi bi-building me-1"></i> {{ alumno.escuela }}
                </p>
            </div>
            <div class="ms-auto">
                <a href="/pdf/{{ alumno.id }}" class="btn btn-warning fw-bold shadow-sm">
                    <i class="bi bi-file-earmark-pdf"></i> Generar Boletín
                </a>
            </div>
        </div>
    </div>

    <div class="card shadow-lg border-0" style="border-radius: 20px;">
        <div class="card-body p-0">
            <div class="list-group list-group-flush rounded-bottom-4">
                <a href="/alumno/{{ alumno.id }}/datos" class="list-group-item list-group-item-action p-3 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-person-gear me-3 text-primary"></i>Editar Datos Básicos</span>
                    <i class="bi bi-chevron-right text-muted"></i>
                </a>
                <a href="/alumno/{{ alumno.id }}/notas" class="list-group-item list-group-item-action p-3 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-journal-check me-3 text-success"></i>Carga de Notas</span>
                    <i class="bi bi-chevron-right text-muted"></i>
                </a>
                <a href="/alumno/{{ alumno.id }}/progreso" class="list-group-item list-group-item-action p-3 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-graph-up-arrow me-3 text-info"></i>Asistencia y Progreso</span>
                    <i class="bi bi-chevron-right text-muted"></i>
                </a>
                <a href="/alumno/{{ alumno.id }}/rubricas" class="list-group-item list-group-item-action p-3 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-clipboard-data me-3 text-warning"></i>Evaluación por Rúbricas</span>
                    <i class="bi bi-chevron-right text-muted"></i>
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
