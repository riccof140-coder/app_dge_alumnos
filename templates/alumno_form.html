<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carga Técnica - Sistema de Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='tab.css') }}?v=30">
    <style>
        :root {
            --excel-border: #bdc3c7;
            --excel-focus: #217346; /* Verde oficial Excel */
        }
        body {
            background-color: #2c3e50 !important; /* Fondo oscuro industrial */
        }
        .spreadsheet-container {
            background: #ffffff;
            border: 1px solid var(--excel-border);
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .table-data {
            border-collapse: collapse;
            width: 100%;
        }
        .table-data th {
            background: #f8f9fa;
            border: 1px solid var(--excel-border);
            font-size: 0.85rem;
            color: #444;
            font-weight: 600;
            padding: 4px 8px;
        }
        .table-data td {
            border: 1px solid var(--excel-border);
            padding: 0;
        }
        .table-data input {
            width: 100%;
            border: none;
            padding: 6px 10px;
            font-size: 0.9rem;
            outline: none;
        }
        .table-data input:focus {
            box-shadow: inset 0 0 0 2px var(--excel-focus);
        }
        .row-index {
            background: #ebedef;
            text-align: center;
            width: 40px;
            color: #7f8c8d;
            font-size: 0.8rem;
        }
        .toolbar {
            background: #f3f3f3;
            border-bottom: 1px solid var(--excel-border);
            padding: 8px 15px;
        }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <div class="spreadsheet-container shadow-lg">
        <div class="toolbar d-flex justify-content-between align-items-center">
            <span class="text-uppercase fw-bold small text-muted">Registro de Entrada de Datos</span>
            <div>
                <a href="/inicio" class="btn btn-sm btn-outline-secondary me-2">Esc</a>
                <span class="badge bg-success">Online</span>
            </div>
        </div>

        <form method="POST">
            <table class="table-data">
                <thead>
                    <tr>
                        <th class="row-index">ID</th>
                        <th>NOMBRE_APELLIDO</th>
                        <th>ASIGNATURA_ID</th>
                        <th>INSTITUCION_REF</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="row-index">1</td>
                        <td><input type="text" name="nombre" autocomplete="off" required autofocus></td>
                        <td><input type="text" name="materia" autocomplete="off" required></td>
                        <td><input type="text" name="escuela" autocomplete="off" required></td>
                    </tr>
                </tbody>
            </table>

            <div class="p-3 bg-light border-top">
                <div class="row align-items-center">
                    <div class="col text-muted small">
                        <strong>Tip:</strong> Use [Tab] para navegar entre celdas y [Enter] para enviar.
                    </div>
                    <div class="col text-end">
                        <button type="submit" class="btn btn-success btn-sm px-4 fw-bold">
                            EJECUTAR CARGA (F5)
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<script>
        // Enfocar automáticamente el primer campo al cargar
        window.onload = function() {
            document.querySelector('input[name="nombre"]').focus();
        };

        // Detectar la tecla Enter en el último campo para enviar
        const inputs = document.querySelectorAll('input');
        inputs.forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    // Si no es el último campo, saltar al siguiente
                    if (index < inputs.length - 1) {
                        e.preventDefault();
                        inputs[index + 1].focus();
                    }
                    // Si es el último, el formulario se envía solo
                }
            });
        });
    </script>
</body>
</body>
</html>
