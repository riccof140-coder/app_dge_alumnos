<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Alumno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='tab.css') }}?v=15">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg border-0" style="max-width: 450px; width: 100%; border-radius: 15px;">
            
            <div class="card-header bg-success text-white text-center p-4" style="border-radius: 15px 15px 0 0;">
                <h3 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>Nuevo Alumno</h3>
            </div>
            
            <div class="card-body p-4">
                <form method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted">Nombre del Alumno</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-success"><i class="bi bi-person-badge"></i></span>
                            <input type="text" class="form-control" name="nombre" placeholder="Nombre completo" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted">Materia</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-success"><i class="bi bi-book"></i></span>
                            <input type="text" class="form-control" name="materia" placeholder="Nombre de la materia" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted">Escuela</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-success"><i class="bi bi-building"></i></span>
                            <input type="text" class="form-control" name="escuela" placeholder="Número o nombre de escuela" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success py-2 fw-bold shadow-sm">
                            <i class="bi bi-check-circle-fill me-2"></i>Guardar Alumno
                        </button>
                        <a href="/inicio" class="btn btn-link text-decoration-none text-muted mt-2">
                            <i class="bi bi-arrow-left"></i> Volver a la lista
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
