<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGE - Registro Técnico de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; }
        .table-excel { background: white; border-collapse: collapse; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-excel th, .table-excel td { border: 1px solid #dee2e6; padding: 0; vertical-align: middle; }
        .table-excel th { background: #e9ecef; font-size: 0.75rem; text-transform: uppercase; padding: 8px; color: #495057; }
        .table-excel input { width: 100%; border: none; padding: 10px; outline: none; font-size: 0.9rem; background: transparent; }
        .table-excel input:focus { background: #fff9db; box-shadow: inset 0 0 0 2px #fab005; }
        .nota-alerta { color: #dc3545; font-weight: bold; text-align: center; }
        .nota-ok { color: #0d6efd; font-weight: bold; text-align: center; }
        .header-alumno { background: #212529; color: #00d2d3; padding: 15px; font-family: monospace; border-radius: 8px 8px 0 0; }
    </style>
</head>
<body class="p-4">

<div class="container-fluid">
    <div class="header-alumno d-flex justify-content-between align-items-center">
        <span>>_ ALUMNO: {{ alumno.nombre | upper }} // MATERIA: {{ alumno.materia | upper }}</span>
        <a href="/alumno/{{ alumno.id }}" class="btn btn-sm btn-outline-info">VOLVER A FICHA</a>
    </div>

    <table class="table-excel">
        <thead>
            <tr>
                <th style="width: 50px;">REF</th>
                <th>ACTIVIDAD / EVALUACIÓN</th>
                <th style="width: 180px;">FECHA</th>
                <th style="width: 100px;">NOTA</th>
                <th>OBSERVACIONES</th>
                <th style="width: 50px;"></th>
            </tr>
        </thead>
        <tbody>
            {% for n in notas %}
            <tr>
                <td class="text-center bg-light small">{{ loop.index }}</td>
                <td class="px-3 small">{{ n.actividad }}</td>
                <td class="text-center small">{{ n.fecha }}</td>
                <td class="{% if n.valor|float < 7 %}nota-alerta{% else %}nota-ok{% endif %}">
                    {{ n.valor }}
                </td>
                <td class="px-3 text-muted small">{{ n.observaciones }}</td>
                <td class="text-center">
                    <a href="/eliminar_nota/{{ n.id }}/{{ alumno.id }}" class="text-danger"><i class="bi bi-trash"></i></a>
                </td>
            </tr>
            {% endfor %}

            <tr style="background: #f1f9f1;">
                <form action="/alumno/{{ alumno.id }}/notas" method="POST">
                    <td class="text-center text-success fw-bold">+</td>
                    <td><input type="text" name="actividad" placeholder="Nombre de la actividad..." required autofocus></td>
                    <td><input type="date" name="fecha" required></td>
                    <td><input type="number" name="valor" step="0.1" placeholder="0.0" required></td>
                    <td><input type="text" name="obs" placeholder="Obs. y presione ENTER"></td>
                    <td><input type="submit" style="display: none;"></td>
                </form>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
