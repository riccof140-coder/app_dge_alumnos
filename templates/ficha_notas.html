<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Calificaciones Detallado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='tab.css') }}?v=50">
    <style>
        .spreadsheet { width: 100%; border-collapse: collapse; font-family: monospace; background: white; }
        .spreadsheet th, .spreadsheet td { border: 1px solid #ced4da; padding: 0; }
        .spreadsheet th { background: #e9ecef; font-size: 0.7rem; padding: 6px; color: #495057; text-align: center; }
        .spreadsheet input { width: 100%; border: none; padding: 8px; outline: none; background: transparent; font-size: 0.85rem; }
        .spreadsheet input:focus { background: #fff9db; box-shadow: inset 0 0 0 2px #fab005; }
        .header-info { background: #343a40; color: #f8f9fa; padding: 10px; font-size: 0.8rem; border-bottom: 3px solid #0d6efd; }
        .nota-roja { color: #e03131; font-weight: bold; text-align: center; }
        .nota-azul { color: #1971c2; font-weight: bold; text-align: center; }
    </style>
</head>
<body style="background: #212529 !important;">

<div class="container-fluid py-3">
    <div class="header-info shadow d-flex justify-content-between">
        <span>[ REGISTRO ] ALUMNO: {{ alumno.nombre }} | MATERIA: {{ alumno.materia }}</span>
        <span>FECHA_SISTEMA: 11-03-2026</span>
    </div>

    <div class="bg-white shadow-lg overflow-hidden">
        <table class="spreadsheet">
            <thead>
                <tr>
                    <th style="width: 50px;">ID</th>
                    <th>ACTIVIDAD / EVALUACIÓN</th>
                    <th style="width: 150px;">FECHA</th>
                    <th style="width: 100px;">CALIF.</th>
                    <th>OBSERVACIONES</th>
                </tr>
            </thead>
            <tbody>
                {% for n in notas %}
                <tr>
                    <td class="text-center bg-light small">{{ loop.index }}</td>
                    <td class="px-2">{{ n.actividad }}</td>
                    <td class="text-center">{{ n.fecha }}</td>
                    <td class="{% if n.valor|float < 7 %}nota-roja{% else %}nota-azul{% endif %}">
                        {{ n.valor }}
                    </td>
                    <td class="px-2 text-muted small">{{ n.observaciones }}</td>
                </tr>
                {% endfor %}

                <tr class="bg-light">
                    <form method="POST">
                        <td class="text-center fw-bold text-primary">NEW</td>
                        <td>
                            <input type="text" name="actividad" placeholder="Nombre actividad..." required autofocus>
                        </td>
                        <td>
                            <input type="date" name="fecha" required>
                        </td>
                        <td>
                            <input type="number" name="valor" step="0.1" placeholder="0.0" required>
                        </td>
                        <td>
                            <input type="text" name="obs" placeholder="Enter para guardar...">
                        </td>
                        <input type="submit" style="display: none;">
                    </form>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-3">
        <a href="/alumno/{{ alumno.id }}" class="btn btn-sm btn-outline-light">Terminar Edición</a>
    </div>
</div>

</body>
</html>
